name: Android Production CI/CD Build & Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write # Required for CodeQL and SARIF uploads

jobs:
  static-analysis:
    name: 1. Code Quality & Static Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Run Android Lint
      run: ./gradlew :app:lintDebug

  security-scan:
    name: 2. Dependency Vulnerability & Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Submit Dependency Graph to GitHub Dependency Review
      uses: gradle/actions/dependency-submission@v4

  unit-tests:
    name: 3. JVM Unit & Robolectric Testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create Mock Env File
      run: |
        echo "GEMINI_API_KEY=dummy_ci_key" > .env
        echo "GEMINI_API_KEY=dummy_ci_key" > .env.example

    - name: Run JVM Unit Tests
      run: ./gradlew :app:testDebugUnitTest

  build-and-package:
    name: 4. Build Production Artifacts
    needs: [static-analysis, security-scan, unit-tests]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create Mock Env File
      run: |
        echo "GEMINI_API_KEY=dummy_ci_key" > .env
        echo "GEMINI_API_KEY=dummy_ci_key" > .env.example

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release Bundle
      run: ./gradlew bundleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Release Bundle (AAB) Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-bundle
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 14
        if-no-files-found: warn
